[project]
name = "backend"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "google-genai>=1.14.0",
    "pillow>=12.1.1",
    "pillow-heif>=1.3.0",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "resend>=2.23.0",
    "supabase>=2.28.0",
    "claude-agent-sdk==0.1.48",
    "openpyxl>=3.1.0",
    "pydantic>=2.0.0",
]

[dependency-groups]
dev = ["pytest"]

[tool.pytest.ini_options]
markers = [
    "slow: tests that require a running Ollama instance with a vision model",
]
